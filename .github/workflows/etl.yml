name: ETL Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ETL
        run: node etl/process.js

      - name: Commit processed data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/silver data/gold
          git diff --staged --quiet || git commit -m "ETL: update silver and gold data"
          git push

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync gold dataset to S3
        run: |
          aws s3 sync data/gold s3://question-answer-app123/gold --delete

