name: Upload Gold Data to GCP
on:
  push:
    paths:
      - 'countries.json'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: 'Upload to GCP Bucket'
        uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: 'countries.json'
          destination: 'newqaapp/gold/' # Use your actual bucket name
          parent: false # This ensures it doesn't create an extra subfolderne